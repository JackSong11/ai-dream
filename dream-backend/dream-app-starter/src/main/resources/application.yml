server:
  port: 8080

spring:
  application:
    name: dream-app
  servlet:
    multipart:
      max-file-size: 50MB       # 单个文件最大大小
      max-request-size: 50MB    # 单次请求最大大小
  elasticsearch:
    uris: http://127.0.0.1:9200
    username: elastic
    password: 123456
    connection-timeout: 3s
    socket-timeout: 30s
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      # password:        # 如有密码请取消注释并填写
      # database: 0      # 默认使用 0 号库
      lettuce:
        pool:
          max-active: 8   # 连接池最大连接数
          max-idle: 8     # 连接池最大空闲连接数
          min-idle: 0     # 连接池最小空闲连接数
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai-dream?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: 123456
  ai:
    chat:
      client:
        observations:
          # Spring AI 标准内容日志；日志自动携带 traceId/spanId，可从 Grafana Trace 跳转关联日志。
          log-prompt: ${AI_OBSERVABILITY_LOG_CONTENT:true}
          log-completion: ${AI_OBSERVABILITY_LOG_CONTENT:true}
      observations:
        log-prompt: ${AI_OBSERVABILITY_LOG_CONTENT:true}
        log-completion: ${AI_OBSERVABILITY_LOG_CONTENT:true}
        include-error-logging: true
    tools:
      observations:
        # 同时写入 Spring AI 标准工具 span；生产环境应设为 false。
        include-content: ${AI_OBSERVABILITY_INCLUDE_TOOL_CONTENT:true}
    # ChatClient 由 dream.ai.providers 动态创建；Spring AI 2.0 使用该顶层属性关闭默认 ChatModel 自动配置。
    # 这不会影响下面的 OpenAI EmbeddingModel 自动配置。
    model:
      chat: none
    openai:
      base-url: http://localhost:11434/v1
      api-key: 123456
      chat:
        model: Qwen3-235B-A22B
      embedding:
        model: Qwen3-Embedding-8B

# ==================== 多模型可切换配置 ====================
# 采用「供应商(provider) -> 模型(models)」两层结构。
# 同一 URL / 密钥下切换不同模型名时，base-url / api-key 只需在 provider 上写一次，
# 新增模型仅需在该 provider 的 models 下追加 key + name + model 三行，无需改动任何代码。
dream:
  observability:
    # 仅导出 Agent 根 observation 及其所有子调用，屏蔽普通 HTTP/CORS/数据库等独立 trace。
    agent-only: ${AGENT_OBSERVABILITY_ONLY:true}
  agent:
    max-iterations: 8
    max-attempts: 3
    retry-backoff-millis: 250
    timeout-seconds: 120
    max-injections-per-turn: 20
    max-history-messages: 80
    stream-chunk-size: 12
  ai:
    # 未指定 modelKey 且无 primary 时的兜底模型
    default-model: Qwen3-235B-A22B
    providers:
      # —— 供应商1：京东云网关（同一 URL + key 下挂多个模型）——
      - id: ollama
        type: openai-compatible               # 协议类型（决定用哪个 provider 构建）
        base-url: http://localhost:11434/v1 # 该供应商所有模型共享
        api-key: 123456
        temperature: 0.7                        # 供应商级默认温度
        models:
          - key: ollama-qwen2.5:7b                      # 切换用唯一标识
            name: ollama-qwen2.5:7b                # 前端展示名
            model: qwen2.5:7b               # 底层真实模型名
            primary: true                        # 默认模型
          - key: Qwen3.5-122B-A10B                        # 同一 URL，只加这 3 行即可
            name: Qwen3.5-122B-A10B
            model: Qwen3.5-122B-A10B
            temperature: 0.6                     # 可选：模型级覆盖温度
      # —— 供应商3：DeepSeek 官方 API（Spring AI DeepSeek 原生实现）——
      - id: deepseek
        type: deepseek
        base-url: https://api.deepseek.com
        api-key: ${DEEPSEEK_API_KEY}          # 启动时通过环境变量注入
        models:
          - key: deepseek-v4-flash
            name: deepseek-v4-flash
            model: deepseek-v4-flash
          - key: deepseek-v4-pro
            name: deepseek-v4-pro
            model: deepseek-v4-pro
            temperature: 0.6


# MinIO 对象存储配置
minio:
  endpoint: http://127.0.0.1:9000
  access-key: rag_flow
  secret-key: infini_rag_flow
  bucket: dream
  presign-expiry-seconds: 7200

# Agent 全链路通过 OTLP/HTTP 发往本地 OpenTelemetry Collector（例如 Grafana OTEL-LGTM）。
management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  opentelemetry:
    resource-attributes:
      service.namespace: ai-dream
      deployment.environment: ${DEPLOYMENT_ENVIRONMENT:local}
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
          transport: http
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

# 对应 Logger 的日志级别调为 DEBUG 或更低
logging:
  level:
    # 比如你的类在 com.example.dao 包下
    com.example.dream: DEBUG
    org.springframework.ai: ${SPRING_AI_LOG_LEVEL:INFO}
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "
